name: festenao_dashboard_base_app
description: "Reusable Festenao dashboard base app (riverpod, go_router): generic providers, synced sdb content/blog infrastructure and demo screens."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ">=3.0.0"
  hooks_riverpod: ">=3.0.0"
  riverpod: ">=3.0.0"
  riverpod_annotation: ">=4.0.0"

  # Routing
  go_router: ">=17.1.0"

  cupertino_icons: ">=1.0.9"
  idb_shim:
  idb_sqflite: ">=1.4.3"
  fs_shim:
  meta:
  barcode_widget: ">=2.0.4"

  # Festenao common + base apps
  tkcms_common:
    git:
      url: https://github.com/tekartikprj/tkcms.git
      path: packages/tkcms_common
  festenao_common:
    git:
      url: https://github.com/tekaly/festenao
      path: packages/festenao_common
  festenao_admin_base_app:
    git:
      url: https://github.com/tekaly/festenao
      path: packages_flutter/festenao_admin_base_app
  festenao_base_app:
    git:
      url: https://github.com/tekaly/festenao
      path: packages_flutter/festenao_base_app
  tkcms_admin_app:
    git:
      url: https://github.com/tekartikprj/tkcms.git
      path: flutter_packages/tkcms_admin_app
  tkcms_user_app:
    git:
      url: https://github.com/tekartikprj/tkcms.git
      path: flutter_packages/tkcms_user_app
  tekartik_firebase_ui_auth:
    git:
      url: https://github.com/tekartik/firebase_ui.dart
      path: packages/firebase_ui_auth

  # Synced sdb
  tekaly_sdb_synced:
    git:
      url: https://github.com/tekartikprj/tekaly
      path: packages/sdb_synced
  tekartik_app_cv_sdb:
    git:
      url: https://github.com/tekartik/app_common_utils.dart
      path: app_cv_sdb

  # Navigation bridge
  tekartik_app_navigator_flutter:
    git:
      url: https://github.com/tekartik/app_flutter_utils.dart
      path: app_navigator
  tekartik_app_flutter_bloc:
    git:
      url: https://github.com/tekartik/app_flutter_utils.dart
      path: app_bloc

  # Widgets / blocs / utils used by the relocated screens
  tekartik_app_flutter_widget:
    git:
      url: https://github.com/tekartik/app_flutter_utils.dart
      path: app_widget
  tekartik_app_flutter_fs:
    git:
      url: https://github.com/tekartik/app_flutter_utils.dart
      path: app_fs
  tekartik_app_rx_bloc:
    git:
      url: https://github.com/tekartik/app_common_utils.dart
      path: app_rx_bloc
  tekartik_app_url_launcher_flutter:
    git:
      url: https://github.com/tekartik/app_flutter_utils.dart
      path: app_url_launcher

  tekartik_common_utils:
    git: https://github.com/tekartik/common_utils.dart

dev_dependencies:
  build_runner: ">=2.4.13"
  flutter_test:
    sdk: flutter
  flutter_lints: ">=6.0.0"
  riverpod_generator:
  tekartik_lints_flutter:
    git:
      url: https://github.com/tekartik/common_flutter.dart
      path: packages/lints_flutter

flutter:
  uses-material-design: true
resolution: workspace
