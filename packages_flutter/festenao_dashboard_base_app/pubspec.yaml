name: festenao_dashboard_base_app
description: "Reusable Festenao dashboard base app (riverpod, go_router): generic providers, synced sdb content/blog infrastructure and demo screens."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ">=3.0.0"
  riverpod: ">=3.0.0"
  riverpod_annotation: ">=4.0.0"

  # Routing
  go_router: ">=17.1.0"

  cupertino_icons: ">=1.0.9"
  idb_shim:
  meta:

  # Festenao common + admin base app
  festenao_common:
    git:
      url: https://github.com/tekaly/festenao
      path: packages/festenao_common
  festenao_admin_base_app:
    git:
      url: https://github.com/tekaly/festenao
      path: packages_flutter/festenao_admin_base_app

  # Synced sdb
  tekaly_sdb_synced:
    git:
      url: https://github.com/tekartikprj/tekaly.git
      path: packages/sdb_synced
  tekartik_app_cv_sdb:
    git:
      url: https://github.com/tekartik/app_common_utils.dart
      path: app_cv_sdb

  # Navigation bridge
  tekartik_app_navigator_flutter:
    git:
      url: https://github.com/tekartik/app_flutter_utils.dart
      path: app_navigator
  tekartik_app_flutter_bloc:
    git:
      url: https://github.com/tekartik/app_flutter_utils.dart
      path: app_bloc

  tekartik_common_utils:
    git: https://github.com/tekartik/common_utils.dart

dev_dependencies:
  build_runner: ">=2.4.13"
  flutter_test:
    sdk: flutter
  flutter_lints: ">=6.0.0"
  riverpod_generator:

flutter:
  uses-material-design: true
resolution: workspace
