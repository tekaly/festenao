name: festenao_riverpod
description: "Generic Festenao riverpod providers: FileSystem, SdbFactory, FestenaoAppFlavorContext and FirebaseApp."
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.12.0

dependencies:
  festenao_common:
    git:
      url: https://github.com/tekaly/festenao
      path: packages/festenao_common
  fs_shim: ">=2.5.5"
  idb_shim: ">=2.9.6"
  idb_sqflite: ">=1.4.4-2"
  riverpod: ">=3.0.0"
  riverpod_annotation: ">=4.0.0"
  tekartik_common_utils:
    git: https://github.com/tekartik/common_utils.dart
  tekartik_firebase:
    git:
      url: https://github.com/tekartik/firebase.dart
      path: firebase
  tkcms_common:
    git:
      url: https://github.com/tekartikprj/tkcms.git
      path: packages/tkcms_common

dev_dependencies:
  build_runner: ">=2.4.13"
  riverpod_generator:
  tekartik_firebase_firestore_sembast:
    git:
      url: https://github.com/tekartik/firebase_firestore.dart
      path: firestore_sembast
  tekartik_firebase_local:
    git:
      url: https://github.com/tekartik/firebase.dart
      path: firebase_local
  tekartik_lints:
    git:
      url: https://github.com/tekartik/common.dart
      path: packages/lints
  test: ">=1.31.0"

resolution: workspace
