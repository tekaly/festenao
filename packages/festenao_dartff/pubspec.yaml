name: festenao_dartff
description: Dart ff project
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  festenao_common:
    path: ../festenao_common
  firebase_functions: ">=0.6.0"
  tekartik_firebase_functions_admin_sdk:
    git:
      url: https://github.com/tekartik/firebase_admin_sdk.dart
      path: firebase_functions_admin_sdk
  tekartik_firebase_functions_admin_sdk_http:
